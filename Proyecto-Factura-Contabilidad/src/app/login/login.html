<div class="min-h-screen w-full flex items-center justify-center bg-gray-50 p-4">
  <div class="w-full max-w-4xl flex flex-col lg:flex-row items-center justify-center">

    <div class="w-full lg:w-2/3 flex items-center justify-center px-6">
      <div class="w-full max-w-md">

        <div class="mb-8 text-center">
          <h1 class="text-3xl font-bold mb-2">Bienvenido Sistema de Prueba</h1>
          <p class="text-gray-600">Inicia sesión para continuar con la gestión de tu inventario.</p>
        </div>

        <div class="bg-white rounded-2xl p-8 shadow-md w-full">
          <form
            [formGroup]="loginForm"
            (ngSubmit)="modoCambioContrasena ? cambiarContrasenaDefinitiva() : iniciarSesion()"
            class="space-y-6"
          >

            <!-- Cédula -->
            <div class="space-y-1">
              <label class="text-gray-700 font-medium">Cédula</label>
              <input
                type="text"
                formControlName="cedula"
                placeholder="Ingrese su cédula"
                class="w-full pl-4 pr-4 py-3 border rounded-xl shadow-sm
                       focus:outline-none focus:ring-2 focus:ring-blue-500"
              >
            </div>

            <!-- Contraseña -->
            <div class="space-y-1">
              <label class="text-gray-700 font-medium">Contraseña</label>
              <input
                type="password"
                formControlName="contrasena"
                placeholder="Ingrese su contraseña"
                class="w-full pl-4 pr-4 py-3 border rounded-xl shadow-sm
                       focus:outline-none focus:ring-2 focus:ring-blue-500"
              >
            </div>

            <!-- Botón LOGIN -->
            <button
              type="submit"
              class="w-full h-12 bg-blue-500 hover:bg-blue-600
                     text-white rounded-xl shadow-lg shadow-blue-500/30
                     transition-all duration-200 hover:shadow-xl hover:shadow-blue-500/40
                     active:scale-[0.98] disabled:opacity-40 disabled:cursor-not-allowed"
              [disabled]="cargando || modoCambioContrasena"
            >
              {{ cargando ? 'Ingresando...' : 'Iniciar Sesión' }}
            </button>

            <!-- Error general -->
            <p *ngIf="mensajeError" class="text-red-600 text-center font-medium">
              {{ mensajeError }}
            </p>

            <div class="text-center">
              <a
                class="text-blue-500 hover:text-blue-600 transition-colors cursor-pointer"
                (click)="olvidoContrasena()"
              >
                ¿Olvidaste tu contraseña?
              </a>
            </div>

            <!-- CAMBIO OBLIGATORIO DE CONTRASEÑA -->
            <div
              *ngIf="modoCambioContrasena"
              class="mt-4 border border-blue-100 rounded-xl p-4 bg-blue-50/40 space-y-3"
            >
              <h2 class="text-sm font-semibold text-slate-900">Cambio de contraseña requerido</h2>
              <p class="text-xs text-slate-600">
                Iniciaste con contraseña temporal (CTmp_A*****). Debes cambiarla para acceder.
              </p>

              <div class="space-y-2">
                <div>
                  <label class="block text-xs font-medium text-slate-700 mb-1">Nueva contraseña</label>
                  <input
                    type="password"
                    formControlName="nuevaContrasena"
                    class="w-full rounded-xl border border-slate-300 px-3 py-2 text-sm
                           focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
                  />
                </div>

                <div>
                  <label class="block text-xs font-medium text-slate-700 mb-1">Confirmar nueva contraseña</label>
                  <input
                    type="password"
                    formControlName="nuevaContrasena2"
                    class="w-full rounded-xl border border-slate-300 px-3 py-2 text-sm
                           focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
                  />
                </div>
              </div>

              <p *ngIf="nuevaContrasenaError" class="text-[11px] text-rose-600">
                {{ nuevaContrasenaError }}
              </p>

              <div class="flex justify-end gap-2 pt-1">
                <button
                  type="button"
                  class="px-3 py-1.5 rounded-xl border border-slate-200 text-xs text-slate-600 hover:bg-slate-50"
                  (click)="cancelarCambioContrasena()"
                  [disabled]="cargando"
                >
                  Cancelar
                </button>

                <button
                  type="button"
                  class="px-4 py-1.5 rounded-xl bg-blue-600 text-xs font-semibold text-white hover:bg-blue-700
                         disabled:opacity-40 disabled:cursor-not-allowed"
                  (click)="cambiarContrasenaDefinitiva()"
                  [disabled]="cargando"
                >
                  {{ cargando ? 'Guardando...' : 'Actualizar contraseña' }}
                </button>
              </div>
            </div>

          </form>
        </div>

      </div>
    </div>

  </div>
</div>
