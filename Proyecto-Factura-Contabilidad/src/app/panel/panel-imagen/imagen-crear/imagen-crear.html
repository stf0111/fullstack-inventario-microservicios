<div class="space-y-6 max-w-3xl mx-auto">

  <div class="flex items-center justify-between">
    <div>
      <h1 class="text-2xl font-semibold text-slate-900">Crear imagen</h1>
      <p class="text-sm text-slate-500">Registra una nueva imagen para un producto.</p>
    </div>

    <button
      type="button"
      (click)="volver()"
      class="px-3 py-1.5 rounded-xl border border-slate-200 text-sm text-slate-600 hover:bg-slate-50"
    >
      Volver
    </button>
  </div>

  <div class="bg-white rounded-2xl shadow-sm border border-slate-100 p-6 space-y-5">

    <div *ngIf="mensajeError" class="text-sm text-rose-600 bg-rose-50 border border-rose-200 px-3 py-2 rounded-lg">
      {{ mensajeError }}
    </div>

    <div *ngIf="mensajeOk" class="text-sm text-emerald-600 bg-emerald-50 border border-emerald-200 px-3 py-2 rounded-lg">
      {{ mensajeOk }}
    </div>

    <div *ngIf="cargando" class="text-sm text-slate-500">Cargando...</div>

    <div class="space-y-6" *ngIf="!cargando">

      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">Producto *</label>
        <select
          [(ngModel)]="imagen.prodId"
          class="w-full rounded-xl border border-slate-300 px-3 py-2 text-sm bg-white
                 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
        >
          <option [ngValue]="null">Seleccione un producto</option>
          <option *ngFor="let p of productos" [ngValue]="p.prodId">
            {{ p.prodNombre }}
          </option>
        </select>
      </div>

      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">Nombre</label>
        <input
          type="text"
          [(ngModel)]="imagen.imgNombre"
          class="w-full rounded-xl border border-slate-300 px-3 py-2 text-sm
                 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
          placeholder="Ej: Vista frontal"
        />
      </div>

      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">URL de imagen *</label>
        <input
          type="text"
          [(ngModel)]="imagen.imgUrl"
          class="w-full rounded-xl border border-slate-300 px-3 py-2 text-sm
                 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
          placeholder="https://..."
        />
      </div>

      <div *ngIf="imagen.imgUrl" class="rounded-xl border border-slate-200 overflow-hidden bg-slate-50">
        <img
          [src]="imagen.imgUrl"
          alt="Vista previa"
          class="w-full max-h-80 object-contain"
        />
      </div>

      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">Descripción</label>
        <textarea
          [(ngModel)]="imagen.imgDescripcion"
          rows="3"
          class="w-full rounded-xl border border-slate-300 px-3 py-2 text-sm
                 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
          placeholder="Descripción opcional"
        ></textarea>
      </div>

      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">Orden *</label>
        <input
          type="number"
          min="0"
          step="1"
          [(ngModel)]="imagen.orden"
          class="w-full rounded-xl border border-slate-300 px-3 py-2 text-sm
                 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
        />
      </div>

      <div class="flex items-center gap-6 text-sm">
        <label class="inline-flex items-center gap-2">
          <input type="checkbox" [(ngModel)]="imagen.esPrincipal" />
          <span>Es principal</span>
        </label>

        <label class="inline-flex items-center gap-2">
          <input type="checkbox" [(ngModel)]="imagen.imgEstado" />
          <span>Activa</span>
        </label>
      </div>

    </div>

    <div class="flex justify-end pt-2">
      <button
        type="button"
        (click)="guardarImagen()"
        [disabled]="cargando || !esAdminUI()"
        class="px-5 py-2.5 rounded-xl bg-blue-600 text-white text-sm font-semibold
               hover:bg-blue-700 shadow-sm disabled:opacity-40 disabled:cursor-not-allowed"
        [title]="!esAdminUI() ? 'Sin permisos' : 'Guardar imagen'"
      >
        {{ cargando ? 'Guardando...' : 'Guardar imagen' }}
      </button>
    </div>

  </div>

  <div *ngIf="modalOkVisible" class="fixed inset-0 bg-slate-900/40 flex items-center justify-center z-40">
    <div class="bg-white rounded-2xl shadow-xl p-6 w-full max-w-sm space-y-4">
      <h2 class="text-lg font-semibold text-slate-900">Listo</h2>
      <p class="text-sm text-slate-600">{{ modalOkMensaje }}</p>
      <div class="text-[11px] text-slate-500">Redirigiendo...</div>
    </div>
  </div>

</div>
