<div class="space-y-6 max-w-3xl mx-auto">

  <!-- TÍTULO + VOLVER -->
  <div class="flex items-center justify-between">
    <h1 class="text-2xl font-semibold text-slate-900">
      Crear cliente
    </h1>

    <button
      type="button"
      (click)="volver()"
      class="px-3 py-1.5 rounded-xl border border-slate-200 text-sm text-slate-600 hover:bg-slate-50"
    >
      Volver
    </button>
  </div>

  <!-- CARD -->
  <div class="bg-white rounded-2xl shadow-sm border border-slate-100 p-6 space-y-5">

    <!-- MENSAJES -->
    <div *ngIf="mensajeError" class="text-sm text-rose-600 bg-rose-50 border border-rose-200 px-3 py-2 rounded-lg">
      {{ mensajeError }}
    </div>

    <div *ngIf="mensajeOk" class="text-sm text-emerald-600 bg-emerald-50 border border-emerald-200 px-3 py-2 rounded-lg">
      {{ mensajeOk }}
    </div>

    <!-- FORM -->
    <div class="space-y-4">

      <!-- Cédula -->
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">
          Cédula (Ecuador)
        </label>
        <input
          type="text"
          [(ngModel)]="cliente.cliCedula"
          class="w-full rounded-xl border border-slate-300 px-3 py-2 text-sm
                 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
          placeholder="Ej: 1799999999"
        />
        <p class="text-[11px] text-slate-500 mt-1">
          Si ingresas cédula, se valida con algoritmo oficial (provincia + dígito verificador).
        </p>
      </div>

      <!-- Nombre -->
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">
          Nombre *
        </label>
        <input
          type="text"
          [(ngModel)]="cliente.cliNombre"
          class="w-full rounded-xl border border-slate-300 px-3 py-2 text-sm
                 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
          placeholder="Ej: Juan"
        />
      </div>

      <!-- Apellido -->
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">
          Apellido *
        </label>
        <input
          type="text"
          [(ngModel)]="cliente.cliApellido"
          class="w-full rounded-xl border border-slate-300 px-3 py-2 text-sm
                 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
          placeholder="Ej: Pérez"
        />
      </div>

      <!-- Dirección -->
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">
          Dirección
        </label>
        <input
          type="text"
          [(ngModel)]="cliente.cliDireccion"
          class="w-full rounded-xl border border-slate-300 px-3 py-2 text-sm
                 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
          placeholder="Ej: Av. Amazonas y NN.UU."
        />
      </div>

      <!-- Correo -->
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">
          Correo
        </label>
        <input
          type="email"
          [(ngModel)]="cliente.cliCorreo"
          class="w-full rounded-xl border border-slate-300 px-3 py-2 text-sm
                 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
          placeholder="Ej: cliente@mail.com"
        />
        <p class="text-[11px] text-slate-500 mt-1">
          Si ingresas correo, se valida el formato.
        </p>
      </div>

      <!-- Teléfono -->
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">
          Teléfono
        </label>
        <input
          type="text"
          [(ngModel)]="cliente.cliTelefono"
          class="w-full rounded-xl border border-slate-300 px-3 py-2 text-sm
                 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
          placeholder="Ej: 0999999999 o 022345678"
        />
        <p class="text-[11px] text-slate-500 mt-1">
          Ecuador: se acepta <strong>09</strong> (10 dígitos) o <strong>02</strong> (9 dígitos).
        </p>
      </div>

    </div>

    <!-- GUARDAR -->
    <div class="flex justify-end pt-2">
      <button
        type="button"
        (click)="guardarCliente()"
        [disabled]="cargando || !esAdminUI()"
        class="px-5 py-2.5 rounded-xl bg-blue-600 text-white text-sm font-semibold
               hover:bg-blue-700 shadow-sm disabled:opacity-40 disabled:cursor-not-allowed"
        [title]="!esAdminUI() ? 'Sin permisos' : 'Guardar cliente'"
      >
        {{ cargando ? 'Guardando...' : 'Guardar cliente' }}
      </button>
    </div>

  </div>

  <!-- ✅ MODAL OK (AUTO 2s) -->
  <div *ngIf="modalOkVisible" class="fixed inset-0 bg-slate-900/40 flex items-center justify-center z-40">
    <div class="bg-white rounded-2xl shadow-xl p-6 w-full max-w-sm space-y-4">
      <h2 class="text-lg font-semibold text-slate-900">Listo</h2>
      <p class="text-sm text-slate-600">{{ modalOkMensaje }}</p>
      <div class="text-[11px] text-slate-500">Redirigiendo...</div>
    </div>
  </div>

</div>
