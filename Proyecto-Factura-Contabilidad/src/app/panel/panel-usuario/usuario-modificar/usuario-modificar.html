<div class="space-y-6 max-w-3xl mx-auto">

  <div class="flex items-center justify-between">
    <div>
      <h1 class="text-2xl font-semibold text-slate-900">Modificar usuario</h1>
      <p class="text-sm text-slate-500">Actualiza los datos del usuario seleccionado.</p>
    </div>

    <button
      type="button"
      (click)="volver()"
      class="px-3 py-1.5 rounded-xl border border-slate-200 text-sm text-slate-600 hover:bg-slate-50"
    >
      Volver
    </button>
  </div>

  <div class="bg-white rounded-2xl shadow-sm border border-slate-100 p-6 space-y-5">

    <div *ngIf="mensajeError" class="text-sm text-rose-600 bg-rose-50 border border-rose-200 px-3 py-2 rounded-lg">
      {{ mensajeError }}
    </div>

    <div *ngIf="mensajeOk" class="text-sm text-emerald-600 bg-emerald-50 border border-emerald-200 px-3 py-2 rounded-lg">
      {{ mensajeOk }}
    </div>

    <div *ngIf="cargando" class="text-sm text-slate-500">Cargando...</div>

    <div class="space-y-4" *ngIf="!cargando && usuario">

      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">Código (ID)</label>
        <input
          type="text"
          [value]="usuario.usuId"
          disabled
          class="w-full rounded-xl border border-slate-200 px-3 py-2 text-sm bg-slate-50 text-slate-500"
        />
      </div>

      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">Cédula</label>
        <input
          type="text"
          [(ngModel)]="usuario.usuCedula"
          disabled
          class="w-full rounded-xl border border-slate-200 px-3 py-2 text-sm bg-slate-50 text-slate-500"
        />
      </div>

      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">Nombre *</label>
        <input
          type="text"
          [(ngModel)]="usuario.usuNombre"
          class="w-full rounded-xl border border-slate-300 px-3 py-2 text-sm
                 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
          placeholder="Ej: Carlos"
        />
      </div>

      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">Apellido *</label>
        <input
          type="text"
          [(ngModel)]="usuario.usuApellido"
          class="w-full rounded-xl border border-slate-300 px-3 py-2 text-sm
                 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
          placeholder="Ej: Gómez"
        />
      </div>

      <div>
        <div class="flex items-center justify-between mb-2">
          <label class="block text-sm font-medium text-slate-700">Rol *</label>
        </div>

        <div *ngIf="roles.length > 0" class="grid grid-cols-1 sm:grid-cols-2 gap-2">
          <label
            *ngFor="let r of roles"
            class="flex items-center gap-2 px-3 py-2 rounded-xl border border-slate-200 hover:bg-slate-50 cursor-pointer"
          >
            <input
              type="radio"
              name="rolUsuario"
              [checked]="rolesSeleccionados.includes(r.rolId)"
              (change)="toggleRol(r.rolId)"
              class="h-4 w-4"
            />
            <span class="text-sm text-slate-800 font-medium">{{ r.rolNombre }}</span>
          </label>
        </div>

        <p class="text-[11px] text-slate-500 mt-2">
          Solo se puede asignar un rol: <strong>ADMIN</strong>, <strong>OPERADOR</strong> o <strong>VENDEDOR</strong>.
        </p>
      </div>

      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">Estado</label>
        <div class="flex items-center gap-4 text-sm">
          <label class="inline-flex items-center gap-1">
            <input type="radio" name="estado" [value]="true" [(ngModel)]="usuario.usuEstado" />
            <span>Activo</span>
          </label>

          <label class="inline-flex items-center gap-1">
            <input type="radio" name="estado" [value]="false" [(ngModel)]="usuario.usuEstado" />
            <span>Inactivo</span>
          </label>
        </div>
      </div>

    </div>

    <div class="flex justify-end pt-2">
      <button
        type="button"
        (click)="guardarCambios()"
        [disabled]="cargando"
        class="px-5 py-2.5 rounded-xl bg-blue-600 text-white text-sm font-semibold
               hover:bg-blue-700 shadow-sm disabled:opacity-40 disabled:cursor-not-allowed"
      >
        {{ cargando ? 'Guardando...' : 'Guardar cambios' }}
      </button>
    </div>

  </div>
</div>

<div *ngIf="modalOkVisible" class="fixed inset-0 bg-slate-900/40 flex items-center justify-center z-40">
  <div class="bg-white rounded-2xl shadow-xl p-6 w-full max-w-sm space-y-4">
    <h2 class="text-lg font-semibold text-slate-900">Listo</h2>
    <p class="text-sm text-slate-600">{{ modalOkMensaje }}</p>

    <div class="flex justify-end pt-2">
      <button
        type="button"
        class="px-4 py-2 rounded-xl bg-blue-600 text-xs font-semibold text-white hover:bg-blue-700"
        (click)="cerrarModalOkYVolver()"
      >
        Entendido
      </button>
    </div>
  </div>
</div>
