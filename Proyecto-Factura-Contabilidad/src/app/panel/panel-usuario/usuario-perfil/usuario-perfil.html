<div class="space-y-6 max-w-3xl mx-auto">

  <!-- TÍTULO + VOLVER -->
  <div class="flex items-center justify-between">
    <div>
      <h1 class="text-2xl font-semibold text-slate-900">👩‍💼 Mi perfil</h1>
      <p class="text-sm text-slate-500">Actualiza tu información y cambia tu contraseña.</p>
    </div>

    <button
      type="button"
      (click)="volver()"
      class="px-3 py-1.5 rounded-xl border border-slate-200 text-sm text-slate-600 hover:bg-slate-50"
    >
      Volver
    </button>
  </div>

  <!-- MENSAJES -->
  <div *ngIf="mensajeError" class="text-sm text-rose-600 bg-rose-50 border border-rose-200 px-3 py-2 rounded-lg">
    {{ mensajeError }}
  </div>

  <div *ngIf="mensajeOk" class="text-sm text-emerald-600 bg-emerald-50 border border-emerald-200 px-3 py-2 rounded-lg">
    {{ mensajeOk }}
  </div>

  <!-- LOADING -->
  <div *ngIf="cargando" class="text-sm text-slate-500">Cargando...</div>

  <!-- FORM -->
  <div class="space-y-6" *ngIf="!cargando">

    <!-- CARD DATOS -->
    <div class="bg-white rounded-2xl shadow-sm border border-slate-100 p-6 space-y-4">
      <h2 class="text-sm font-semibold text-slate-800">Datos personales</h2>

      <!-- ID -->
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">Código (ID)</label>
        <input
          type="text"
          [value]="usuario.usuId"
          disabled
          class="w-full rounded-xl border border-slate-200 px-3 py-2 text-sm bg-slate-50 text-slate-500"
        />
      </div>

      <!-- Cédula (NO editable) -->
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">Cédula (no editable)</label>
        <input
          type="text"
          [(ngModel)]="usuario.usuCedula"
          name="usuCedula"
          disabled
          class="w-full rounded-xl border border-slate-200 px-3 py-2 text-sm bg-slate-50 text-slate-500"
        />
      </div>

      <!-- Nombre -->
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">Nombre *</label>
        <input
          type="text"
          [(ngModel)]="usuario.usuNombre"
          name="usuNombre"
          class="w-full rounded-xl border border-slate-300 px-3 py-2 text-sm
                 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
        />
      </div>

      <!-- Apellido -->
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">Apellido *</label>
        <input
          type="text"
          [(ngModel)]="usuario.usuApellido"
          name="usuApellido"
          class="w-full rounded-xl border border-slate-300 px-3 py-2 text-sm
                 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
        />
      </div>

      <!-- Rol (solo lectura desde /me) -->
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">Rol</label>
        <input
          type="text"
          [value]="rolTexto"
          disabled
          class="w-full rounded-xl border border-slate-200 px-3 py-2 text-sm bg-slate-50 text-slate-500"
        />
      </div>

      <!-- Estado (solo lectura) -->
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">Estado</label>
        <input
          type="text"
          [value]="usuario.usuEstado ? 'Activo' : 'Inactivo'"
          disabled
          class="w-full rounded-xl border border-slate-200 px-3 py-2 text-sm bg-slate-50 text-slate-500"
        />
      </div>
    </div>

    <!-- CARD SEGURIDAD -->
    <div class="bg-white rounded-2xl shadow-sm border border-slate-100 p-6 space-y-4">
      <div class="flex items-center justify-between">
        <h2 class="text-sm font-semibold text-slate-800">Seguridad</h2>

        <button
          type="button"
          class="text-xs px-3 py-1 rounded-full border border-slate-200 text-slate-600 hover:bg-slate-50"
          (click)="mostrarPassword = !mostrarPassword"
        >
          {{ mostrarPassword ? '🙈 Ocultar' : '👁️ Mostrar' }}
        </button>
      </div>

      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">Nueva contraseña (mín. 8 caracteres)</label>
        <input
          [type]="mostrarPassword ? 'text' : 'password'"
          [(ngModel)]="nuevaContrasena"
          name="nuevaContrasena"
          class="w-full rounded-xl border border-slate-300 px-3 py-2 text-sm
                 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
          placeholder="Deja vacío si no deseas cambiarla"
        />
      </div>

      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">Confirmar contraseña</label>
        <input
          [type]="mostrarPassword ? 'text' : 'password'"
          [(ngModel)]="confirmarContrasena"
          name="confirmarContrasena"
          class="w-full rounded-xl border border-slate-300 px-3 py-2 text-sm
                 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
          placeholder="Repite la nueva contraseña"
        />
      </div>

      <p class="text-[11px] text-slate-500">
        Si no escribes contraseña, solo se guardarán tus datos.
      </p>
    </div>

    <!-- BOTÓN GUARDAR -->
    <div class="flex justify-end pt-2">
      <button
        type="button"
        (click)="guardarCambios()"
        [disabled]="cargando"
        class="px-5 py-2.5 rounded-xl bg-blue-600 text-white text-sm font-semibold
               hover:bg-blue-700 shadow-sm disabled:opacity-40 disabled:cursor-not-allowed"
      >
        {{ cargando ? 'Guardando...' : 'Guardar cambios' }}
      </button>
    </div>

  </div>
</div>
